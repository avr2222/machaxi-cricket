name: Scrape CricHeroes Data

on:
  schedule:
    # Every Monday at 7:00 AM IST (1:30 AM UTC)
    - cron: '30 1 * * 1'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push updated CSVs back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install selenium beautifulsoup4 webdriver-manager

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        run: python scrape_cricheroes.py
        timeout-minutes: 30

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ cricheroes_data/ points_table.csv scraped_matches.json scraper_log.txt
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Auto-update match data ($(date +'%Y-%m-%d'))"
            git push
          )
