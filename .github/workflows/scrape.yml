name: Scrape CricHeroes Data

on:
  schedule:
    # Every Sunday at 8:00 PM IST (2:30 PM UTC)
    - cron: '30 14 * * 0'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Re-scrape all matches (ignore tracker)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to push updated CSVs back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install selenium beautifulsoup4 webdriver-manager

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ]; then
            EXTRA_FLAGS="--full-refresh"
          fi
          python scrape_cricheroes.py $EXTRA_FLAGS 2>&1 | tee scraper_log.txt
        timeout-minutes: 30

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ cricheroes_data/ points_table.csv scraped_matches.json scraper_log.txt \
                  batting_leaderboard.csv bowling_leaderboard.csv \
                  fielding_leaderboard.csv mvp_leaderboard.csv \
                  data/player_career.csv
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Auto-update match data ($(date +'%Y-%m-%d'))"
            git push
          )
